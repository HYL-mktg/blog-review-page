<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>HYL 블로그 승인 시스템</title>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 32px 24px; margin: 0; }
    #editor-container, #content-display, #meta-display { max-width: 800px; margin: 0 auto; text-align: left; }
    #editor-container { height: 500px; margin-top: 0; }
    #content-display { background: #fff; }
    .edit-buttons { display: none; }
    .responsive-image { cursor: move; max-width: 100%; height: auto; }
    #title-input { display: none; }

    #notice-bar {
      background: #eff6ff;
      padding: 12px;
      font-size: 14px;
      text-align: center;
      border-bottom: 1px solid #dbeafe;
      display: none;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
  </style>
  <link rel="stylesheet" href="theme-modern.css" />
</head>
<body>
  <div id="notice-bar">
    <span style="color: #1e40af;">📢 <b>새 소식:</b>
      <a id="notice-link" href="#" target="_blank" rel="noopener noreferrer" style="color: #2563eb; text-decoration: underline; font-weight: bold; margin-left: 5px;"></a>
    </span>
  </div>

  <div id="page-header">
    <a href="index.html" id="brand-logo">HYL <span>콘텐츠 검토</span></a>
  </div>

  <div id="edit-mode-badge">✏️ 수정 중 — 변경사항은 <b>수정 완료</b>를 눌러야 저장됩니다.</div>

  <div id="meta-display">
    <div class="meta-company" id="meta-company"></div>
    <div class="meta-title" id="meta-title"></div>
    <input type="text" id="title-input" />
    <div class="meta-date" id="meta-date"></div>
  </div>

  <div id="view-tabs">
    <button class="tab-btn active" id="tab-blog" onclick="switchTab('blog')">📝 블로그</button>
    <button class="tab-btn" id="tab-sns" onclick="switchTab('sns')">📱 SNS 미리보기</button>
  </div>

  <div id="loading">⏳ 불러오는 중입니다...</div>
  <div id="content-display"></div>
  <div id="editor-wrapper">
    <div id="editor-container"></div>
  </div>
  <textarea id="html-editor" spellcheck="false" style="display:none;"></textarea>

  <div id="sns-display" style="display:none;">
    <div class="sns-phone-wrap">
      <div class="sns-card">
        <div class="sns-card-header">
          <div class="sns-avatar"></div>
          <span class="sns-username" id="sns-username"></span>
          <span class="sns-more">···</span>
        </div>
        <div class="sns-image-wrap">
          <img id="sns-first-img" src="" alt="첫 번째 이미지">
          <div id="sns-no-img-placeholder">이미지 없음</div>
        </div>
        <div class="sns-card-body">
          <div class="sns-actions-row">
            <span>♡</span><span>💬</span><span>✈️</span><span class="sns-bookmark">🔖</span>
          </div>
          <div class="sns-caption-live" id="sns-caption-live"></div>
        </div>
      </div>
    </div>
    <div class="sns-edit-section">
      <span class="sns-field-label">SNS 캡션 (메타)</span>
      <textarea id="sns-meta-input" oninput="updateSnsPreview()" placeholder="SNS 캡션을 입력하세요..."></textarea>
      <span class="sns-field-label" style="margin-top:14px;">해시태그</span>
      <div class="sns-hashtags-text" id="sns-hashtags-text"></div>
      <span class="sns-field-label" style="margin-top:12px;">웹사이트 URL</span>
      <div class="sns-url-text" id="sns-url-text"></div>
    </div>
  </div>

  <div id="buttons" style="display:none;">
    <button onclick="toggleEditMode()">✏️ 수정</button>
    <button onclick="sendWebhook('approve')">✅ 승인</button>
    <button onclick="sendWebhook('retry')">🔁 승인 취소</button>
    <button onclick="goHome()">🏠 홈으로</button>
  </div>

  <div id="edit-buttons" class="edit-buttons">
    <button id="btn-apply" onclick="applyEdit()">📝 수정 완료</button>
    <button id="btn-cancel" onclick="cancelEdit()">❌ 취소</button>
    <button onclick="triggerImageUpload()">🖼️ 이미지 추가</button>
    <button id="btn-html-toggle" onclick="toggleHtmlMode()">📋 HTML 편집</button>
  </div>

  <input type="file" id="image-upload" accept="image/*" style="display:none;" />

  <script src="auth.js"></script>
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const access = HYLAuth.resolveCompanyWithPublicOption({
      params: urlParams,
      fallbackPath: "index-company.html",
      redirectTo: "index.html"
    });
    const auth = access.auth;
    const isPublic = access.isPublic;
    const company = access.company;
    const postId = urlParams.get("post_id");

    if (!company || !postId) {
      window.location.href = "index.html";
      throw new Error("Invalid access context");
    }

    const proxyEndpoint = "https://hyltest-airtable-content.mktg-95f.workers.dev/";
    const webhookApprove = "https://hook.eu1.make.com/okhlmq986f82n94qvfyafsxpybx1pvdl";
    const webhookRetry = "https://hook.eu1.make.com/lgbmpgnnaqljrfrzlahbviis82oyii15";

    const loading = document.getElementById("loading");
    const contentDisplay = document.getElementById("content-display");
    const editorWrapper = document.getElementById("editor-wrapper");
    const editorContainer = document.getElementById("editor-container");
    const buttons = document.getElementById("buttons");
    const editButtons = document.getElementById("edit-buttons");
    const metaTitle = document.getElementById("meta-title");
    const metaDisplay = document.getElementById("meta-display");
    const titleInput = document.getElementById("title-input");
    const metaCompany = document.getElementById("meta-company");
    const metaDate = document.getElementById("meta-date");
    const editModeBadge = document.getElementById("edit-mode-badge");

    let quill;
    let htmlContent = "";
    let currentContent = "";
    let airtableRecordId = null;
    let generationMethod = null;
    let isEditMode = false;
    let isHtmlMode = false;
    let snsHashtags = "";
    let snsWebsiteUrl = "";

    function extractFirstImage(html) {
      const div = document.createElement("div");
      div.innerHTML = html;
      const img = div.querySelector("img");
      return img ? img.src : null;
    }

    function switchTab(tab) {
      const tabBlog = document.getElementById("tab-blog");
      const tabSns = document.getElementById("tab-sns");
      const snsDisplay = document.getElementById("sns-display");
      if (tab === "blog") {
        tabBlog.classList.add("active");
        tabSns.classList.remove("active");
        snsDisplay.style.display = "none";
        if (isEditMode) {
          editorWrapper.style.display = "block";
        } else {
          contentDisplay.style.display = "block";
        }
      } else {
        tabBlog.classList.remove("active");
        tabSns.classList.add("active");
        contentDisplay.style.display = "none";
        editorWrapper.style.display = "none";
        snsDisplay.style.display = "block";
      }
    }

    function updateSnsPreview() {
      const metaInput = document.getElementById("sns-meta-input");
      const captionLive = document.getElementById("sns-caption-live");
      const hashtagsText = document.getElementById("sns-hashtags-text");
      const urlText = document.getElementById("sns-url-text");
      const metaVal = metaInput ? metaInput.value.trim() : "";
      const hashtagVal = snsHashtags ? snsHashtags.split(",").map(t => "#" + t.trim()).join(" ") : "";
      const urlVal = snsWebsiteUrl || "";
      captionLive.textContent = [metaVal, hashtagVal, urlVal].filter(Boolean).join("\n\n");
      hashtagsText.textContent = hashtagVal || "해시태그 없음";
      urlText.textContent = urlVal || "URL 없음";
    }

    function setupSnsPanel(record, html) {
      snsHashtags = record["Hashtag"] || "";
      snsWebsiteUrl = record["웹사이트 URL"] || "";
      document.getElementById("sns-meta-input").value = record["메타"] || "";
      document.getElementById("sns-username").textContent = record["기업명"] || "";
      const firstImgSrc = extractFirstImage(html);
      const snsImg = document.getElementById("sns-first-img");
      const snsNoImg = document.getElementById("sns-no-img-placeholder");
      if (firstImgSrc) {
        snsImg.src = firstImgSrc;
        snsImg.style.display = "block";
        snsNoImg.style.display = "none";
      } else {
        snsImg.style.display = "none";
        snsNoImg.style.display = "flex";
      }
      updateSnsPreview();
    }

    // ✅ 노션 링크가 기능하도록 보강된 공지 로드 함수
    function loadNotice() {
      // GitHub에 있는 텍스트 파일 주소 (여기서 제목과 노션 링크를 가져옴)
      const noticeUrl = "https://raw.githubusercontent.com/HYL-mktg/blog-review-page/refs/heads/main/notice.txt";

      fetch(noticeUrl + "?t=" + new Date().getTime())
        .then(res => {
          if (!res.ok) throw new Error("공지 파일을 찾을 수 없습니다.");
          return res.text();
        })
        .then(data => {
          if (!data.includes('|')) return;
          
          // 데이터 파싱 (제목 | 노션링크)
          const parts = data.split('|');
          const title = parts[0].trim();
          const link = parts[1].trim();
          
          if (title && link) {
            const noticeBar = document.getElementById("notice-bar");
            const noticeLink = document.getElementById("notice-link");
            
            noticeLink.innerText = title;
            noticeLink.href = link; // 여기서 노션 링크로 연결됨
            noticeBar.style.display = "block"; 
          }
        })
        .catch(err => console.error("공지사항 로드 중 오류:", err));
    }

    if (!company || !postId) {
      loading.innerHTML = "<span style='color:red;'>❌ URL에 정보가 부족합니다.</span>";
    } else {
      fetch(`${proxyEndpoint}?company=${encodeURIComponent(company)}&post_id=${encodeURIComponent(postId)}`)
        .then(res => res.json())
        .then(data => {
          loading.style.display = "none";
          airtableRecordId = data.airtable_record_id || data.id || null;
          const record = data.fields;
          if (!record) return;
          generationMethod = record["생성 방식"] || "";
          htmlContent = record["내용(html)"] || "";
          currentContent = htmlContent;

          metaCompany.innerText = record["기업명"] || "";
          metaTitle.innerText = record["콘텐츠 제목"] || "제목 없음";
          titleInput.value = record["콘텐츠 제목"] || "제목 없음";
          metaDate.innerText = record["예약 날짜"] ? new Date(record["예약 날짜"]).toLocaleDateString("ko-KR") : "";

          contentDisplay.innerHTML = htmlContent;
          buttons.style.display = "flex";
          setupSnsPanel(record, htmlContent);

          quill = new Quill("#editor-container", {
            theme: "snow",
            placeholder: "내용을 수정하세요...",
            modules: {
              toolbar: [[{ header: [1, 2, false] }], ["bold", "italic", "underline"], ["link", "blockquote"], [{ list: "ordered" }, { list: "bullet" }]]
            }
          });
          quill.clipboard.dangerouslyPasteHTML(htmlContent);
          
          // 데이터 로드 성공 후 공지사항 실행
          loadNotice();
        });
    }

    function toggleEditMode() {
      isEditMode = true;
      switchTab("blog");
      editorWrapper.style.display = "block";
      contentDisplay.style.display = "none";
      buttons.style.display = "none";
      editButtons.style.display = "flex";
      metaTitle.style.display = "none";
      titleInput.style.display = "block";
      editModeBadge.style.display = "block";
      metaDisplay.classList.add("editing");
      document.getElementById("tab-sns").style.opacity = "0.4";
      document.getElementById("tab-sns").style.pointerEvents = "none";
    }

    function toggleHtmlMode() {
      const htmlEditor = document.getElementById("html-editor");
      const btn = document.getElementById("btn-html-toggle");
      if (!isHtmlMode) {
        htmlEditor.value = quill.root.innerHTML;
        htmlEditor.style.display = "block";
        editorWrapper.style.display = "none";
        isHtmlMode = true;
        btn.textContent = "✏️ 비주얼 편집";
      } else {
        quill.clipboard.dangerouslyPasteHTML(htmlEditor.value);
        htmlEditor.style.display = "none";
        editorWrapper.style.display = "block";
        isHtmlMode = false;
        btn.textContent = "📋 HTML 편집";
      }
    }

    function applyEdit() {
      const htmlEditor = document.getElementById("html-editor");
      if (isHtmlMode) {
        currentContent = htmlEditor.value;
        quill.clipboard.dangerouslyPasteHTML(currentContent);
        htmlEditor.style.display = "none";
        editorWrapper.style.display = "block";
        document.getElementById("btn-html-toggle").textContent = "📋 HTML 편집";
        isHtmlMode = false;
      } else {
        currentContent = quill.root.innerHTML;
      }
      isEditMode = false;
      metaTitle.innerText = titleInput.value;
      contentDisplay.innerHTML = currentContent;
      editorWrapper.style.display = "none";
      contentDisplay.style.display = "block";
      buttons.style.display = "flex";
      editButtons.style.display = "none";
      metaTitle.style.display = "block";
      titleInput.style.display = "none";
      editModeBadge.style.display = "none";
      metaDisplay.classList.remove("editing");
      document.getElementById("tab-sns").style.opacity = "";
      document.getElementById("tab-sns").style.pointerEvents = "";
      const firstImgSrc = extractFirstImage(currentContent);
      const snsImg = document.getElementById("sns-first-img");
      const snsNoImg = document.getElementById("sns-no-img-placeholder");
      if (firstImgSrc) {
        snsImg.src = firstImgSrc;
        snsImg.style.display = "block";
        snsNoImg.style.display = "none";
      } else {
        snsImg.style.display = "none";
        snsNoImg.style.display = "flex";
      }
    }

    function cancelEdit() {
      if (isHtmlMode) {
        document.getElementById("html-editor").style.display = "none";
        editorWrapper.style.display = "block";
        document.getElementById("btn-html-toggle").textContent = "📋 HTML 편집";
        isHtmlMode = false;
      }
      isEditMode = false;
      editorWrapper.style.display = "none";
      contentDisplay.style.display = "block";
      buttons.style.display = "flex";
      editButtons.style.display = "none";
      metaTitle.style.display = "block";
      titleInput.style.display = "none";
      editModeBadge.style.display = "none";
      metaDisplay.classList.remove("editing");
      document.getElementById("tab-sns").style.opacity = "";
      document.getElementById("tab-sns").style.pointerEvents = "";
    }

    document.addEventListener("contextmenu", function (e) {
      if (!isEditMode) return;
      if (e.target.tagName === "IMG") {
        e.preventDefault();
        if (confirm("이 이미지를 삭제하시겠습니까?")) {
          const parent = e.target.closest("p") || e.target;
          parent.remove();
        }
      }
    });

    document.addEventListener("click", function (e) {
      if (e.target.tagName === "IMG" && !isEditMode) {
        e.preventDefault();
      }
    }, true);

    function triggerImageUpload() {
      document.getElementById("image-upload").click();
    }

    document.getElementById("image-upload").addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        const img = new Image();
        img.onload = function () {
          const canvas = document.createElement("canvas");
          canvas.width = img.width; canvas.height = img.height;
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
          canvas.toBlob(function (blob) {
            const formData = new FormData();
            formData.append("file", blob, "image.jpg");
            formData.append("upload_preset", "mktg_ai");
            fetch("https://api.cloudinary.com/v1_1/dte6zhuck/image/upload", { method: "POST", body: formData })
              .then(res => res.json())
              .then(result => {
                const url = result.secure_url;
                const range = quill.getSelection(true);
                quill.insertEmbed(range.index, "image", url, Quill.sources.USER);
              });
          }, "image/jpeg", 0.92);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    function sendWebhook(action) {
      const url = action === "approve" ? webhookApprove : webhookRetry;
      const payload = { post_id: postId, company: company, action: action };
      if (airtableRecordId) payload.airtable_record_id = airtableRecordId;
      if (action === "approve") {
        payload["generation_method"] = generationMethod;
        payload["edited_title"] = titleInput.value;
        payload["edited_html"] = currentContent;
        const snsMetaInput = document.getElementById("sns-meta-input");
        if (snsMetaInput) payload["edited_sns_meta"] = snsMetaInput.value;
      }
      fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) })
      .then(() => alert(`${action} 요청 완료`))
      .catch(() => alert("오류 발생"));
    }

    function goHome() {
      window.location.href = HYLAuth.buildCompanyUrl("blog-list-page.html", company);
    }
  </script>
</body>
</html>
