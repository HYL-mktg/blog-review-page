<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>HYL лё”лЎңк·ё мҠ№мқё мӢңмҠӨн…ң</title>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 32px 24px; margin: 0; }
    #editor-container, #content-display, #meta-display { max-width: 800px; margin: 0 auto; text-align: left; }
    #editor-container { height: 500px; display: none; margin-top: 0; }
    #content-display { background: #fff; }
    .edit-buttons { display: none; }
    .responsive-image { cursor: move; max-width: 100%; height: auto; }
    #title-input { display: none; }

    #notice-bar {
      background: #eff6ff;
      padding: 12px;
      font-size: 14px;
      text-align: center;
      border-bottom: 1px solid #dbeafe;
      display: none;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
  </style>
  <link rel="stylesheet" href="theme-modern.css" />
</head>
<body>
  <div id="notice-bar">
    <span style="color: #1e40af;">рҹ“ў <b>мғҲ мҶҢмӢқ:</b>
      <a id="notice-link" href="#" target="_blank" rel="noopener noreferrer" style="color: #2563eb; text-decoration: underline; font-weight: bold; margin-left: 5px;"></a>
    </span>
  </div>

  <div id="page-header">
    <a href="index.html" id="brand-logo">HYL <span>мҪҳн…җмё  кІҖнҶ </span></a>
  </div>

  <div id="edit-mode-badge">вңҸпёҸ мҲҳм • мӨ‘ вҖ” ліҖкІҪмӮ¬н•ӯмқҖ <b>мҲҳм • мҷ„лЈҢ</b>лҘј лҲҢлҹ¬м•ј м ҖмһҘлҗ©лӢҲлӢӨ.</div>

  <div id="meta-display">
    <div class="meta-company" id="meta-company"></div>
    <div class="meta-title" id="meta-title"></div>
    <input type="text" id="title-input" />
    <div class="meta-date" id="meta-date"></div>
  </div>

  <div id="loading">вҸі л¶Ҳлҹ¬мҳӨлҠ” мӨ‘мһ…лӢҲлӢӨ...</div>
  <div id="content-display"></div>
  <div id="editor-wrapper">
    <div id="editor-container"></div>
  </div>

  <div id="buttons" style="display:none;">
    <button onclick="toggleEditMode()">вңҸпёҸ мҲҳм •</button>
    <button onclick="sendWebhook('approve')">вң… мҠ№мқё</button>
    <button onclick="sendWebhook('retry')">рҹ”Ғ мҠ№мқё м·ЁмҶҢ</button>
    <button onclick="goHome()">рҹҸ  нҷҲмңјлЎң</button>
  </div>

  <div id="edit-buttons" class="edit-buttons">
    <button id="btn-apply" onclick="applyEdit()">рҹ“қ мҲҳм • мҷ„лЈҢ</button>
    <button id="btn-cancel" onclick="cancelEdit()">вқҢ м·ЁмҶҢ</button>
    <button onclick="triggerImageUpload()">рҹ–јпёҸ мқҙлҜём§Җ м¶”к°Җ</button>
  </div>

  <input type="file" id="image-upload" accept="image/*" style="display:none;" />

  <script src="auth.js"></script>
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const access = HYLAuth.resolveCompanyWithPublicOption({
      params: urlParams,
      fallbackPath: "index-company.html",
      redirectTo: "index.html"
    });
    const auth = access.auth;
    const isPublic = access.isPublic;
    const company = access.company;
    const postId = urlParams.get("post_id");

    if (!company || !postId) {
      window.location.href = "index.html";
      throw new Error("Invalid access context");
    }

    const proxyEndpoint = "https://hyltest-airtable-content.mktg-95f.workers.dev/";
    const webhookApprove = "https://hook.eu1.make.com/okhlmq986f82n94qvfyafsxpybx1pvdl";
    const webhookRetry = "https://hook.eu1.make.com/lgbmpgnnaqljrfrzlahbviis82oyii15";

    const loading = document.getElementById("loading");
    const contentDisplay = document.getElementById("content-display");
    const editorWrapper = document.getElementById("editor-wrapper");
    const editorContainer = document.getElementById("editor-container");
    const buttons = document.getElementById("buttons");
    const editButtons = document.getElementById("edit-buttons");
    const metaTitle = document.getElementById("meta-title");
    const metaDisplay = document.getElementById("meta-display");
    const titleInput = document.getElementById("title-input");
    const metaCompany = document.getElementById("meta-company");
    const metaDate = document.getElementById("meta-date");
    const editModeBadge = document.getElementById("edit-mode-badge");

    let quill;
    let htmlContent = "";
    let currentContent = "";
    let airtableRecordId = null;
    let generationMethod = null; // м—җм–ҙн…Ңмқҙлё” 'мғқм„ұ л°©мӢқ' м ҖмһҘмҡ©
    let isEditMode = false;

    // вң… л…ём…ҳ л§ҒнҒ¬к°Җ кё°лҠҘн•ҳлҸ„лЎқ ліҙк°•лҗң кіөм§Җ лЎңл“ң н•ЁмҲҳ
    function loadNotice() {
      // GitHubм—җ мһҲлҠ” н…ҚмҠӨнҠё нҢҢмқј мЈјмҶҢ (м—¬кё°м„ң м ңлӘ©кіј л…ём…ҳ л§ҒнҒ¬лҘј к°Җм ёмҳҙ)
      const noticeUrl = "https://raw.githubusercontent.com/HYL-mktg/blog-review-page/refs/heads/main/notice.txt";

      fetch(noticeUrl + "?t=" + new Date().getTime())
        .then(res => {
          if (!res.ok) throw new Error("кіөм§Җ нҢҢмқјмқ„ м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.");
          return res.text();
        })
        .then(data => {
          if (!data.includes('|')) return;
          
          // лҚ°мқҙн„° нҢҢмӢұ (м ңлӘ© | л…ём…ҳл§ҒнҒ¬)
          const parts = data.split('|');
          const title = parts[0].trim();
          const link = parts[1].trim();
          
          if (title && link) {
            const noticeBar = document.getElementById("notice-bar");
            const noticeLink = document.getElementById("notice-link");
            
            noticeLink.innerText = title;
            noticeLink.href = link; // м—¬кё°м„ң л…ём…ҳ л§ҒнҒ¬лЎң м—°кІ°лҗЁ
            noticeBar.style.display = "block"; 
          }
        })
        .catch(err => console.error("кіөм§ҖмӮ¬н•ӯ лЎңл“ң мӨ‘ мҳӨлҘҳ:", err));
    }

    if (!company || !postId) {
      loading.innerHTML = "<span style='color:red;'>вқҢ URLм—җ м •ліҙк°Җ л¶ҖмЎұн•©лӢҲлӢӨ.</span>";
    } else {
      fetch(`${proxyEndpoint}?company=${encodeURIComponent(company)}&post_id=${encodeURIComponent(postId)}`)
        .then(res => res.json())
        .then(data => {
          loading.style.display = "none";
          airtableRecordId = data.airtable_record_id || data.id || null;
          const record = data.fields;
          if (!record) return;
          generationMethod = record["мғқм„ұ л°©мӢқ"] || "";
          htmlContent = record["лӮҙмҡ©(html)"] || "";
          currentContent = htmlContent;

          metaCompany.innerText = record["кё°м—…лӘ…"] || "";
          metaTitle.innerText = record["мҪҳн…җмё  м ңлӘ©"] || "м ңлӘ© м—ҶмқҢ";
          titleInput.value = record["мҪҳн…җмё  м ңлӘ©"] || "м ңлӘ© м—ҶмқҢ";
          metaDate.innerText = record["мҳҲм•Ҫ лӮ м§ң"] ? new Date(record["мҳҲм•Ҫ лӮ м§ң"]).toLocaleDateString("ko-KR") : "";

          contentDisplay.innerHTML = htmlContent;
          buttons.style.display = "flex";

          quill = new Quill("#editor-container", {
            theme: "snow",
            placeholder: "лӮҙмҡ©мқ„ мҲҳм •н•ҳм„ёмҡ”...",
            modules: {
              toolbar: [[{ header: [1, 2, false] }], ["bold", "italic", "underline"], ["link", "blockquote"], [{ list: "ordered" }, { list: "bullet" }]]
            }
          });
          quill.clipboard.dangerouslyPasteHTML(htmlContent);
          
          // лҚ°мқҙн„° лЎңл“ң м„ұкіө нӣ„ кіөм§ҖмӮ¬н•ӯ мӢӨн–ү
          loadNotice();
        });
    }

    function toggleEditMode() {
      isEditMode = true;
      editorWrapper.style.display = "block";
      contentDisplay.style.display = "none";
      buttons.style.display = "none";
      editButtons.style.display = "flex";
      metaTitle.style.display = "none";
      titleInput.style.display = "block";
      editModeBadge.style.display = "block";
      metaDisplay.classList.add("editing");
    }

    function applyEdit() {
      isEditMode = false;
      currentContent = quill.root.innerHTML;
      metaTitle.innerText = titleInput.value;
      contentDisplay.innerHTML = currentContent;
      editorWrapper.style.display = "none";
      contentDisplay.style.display = "block";
      buttons.style.display = "flex";
      editButtons.style.display = "none";
      metaTitle.style.display = "block";
      titleInput.style.display = "none";
      editModeBadge.style.display = "none";
      metaDisplay.classList.remove("editing");
    }

    function cancelEdit() {
      isEditMode = false;
      editorWrapper.style.display = "none";
      contentDisplay.style.display = "block";
      buttons.style.display = "flex";
      editButtons.style.display = "none";
      metaTitle.style.display = "block";
      titleInput.style.display = "none";
      editModeBadge.style.display = "none";
      metaDisplay.classList.remove("editing");
    }

    document.addEventListener("contextmenu", function (e) {
      if (!isEditMode) return;
      if (e.target.tagName === "IMG") {
        e.preventDefault();
        if (confirm("мқҙ мқҙлҜём§ҖлҘј мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?")) {
          const parent = e.target.closest("p") || e.target;
          parent.remove();
        }
      }
    });

    document.addEventListener("click", function (e) {
      if (e.target.tagName === "IMG" && !isEditMode) {
        e.preventDefault();
      }
    }, true);

    function triggerImageUpload() {
      document.getElementById("image-upload").click();
    }

    document.getElementById("image-upload").addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        const img = new Image();
        img.onload = function () {
          const canvas = document.createElement("canvas");
          canvas.width = img.width; canvas.height = img.height;
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
          canvas.toBlob(function (blob) {
            const formData = new FormData();
            formData.append("file", blob, "image.jpg");
            formData.append("upload_preset", "mktg_ai");
            fetch("https://api.cloudinary.com/v1_1/dte6zhuck/image/upload", { method: "POST", body: formData })
              .then(res => res.json())
              .then(result => {
                const url = result.secure_url;
                const range = quill.getSelection(true);
                quill.insertEmbed(range.index, "image", url, Quill.sources.USER);
              });
          }, "image/jpeg", 0.92);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    function sendWebhook(action) {
      const url = action === "approve" ? webhookApprove : webhookRetry;
      const payload = { post_id: postId, company: company, action: action };
      if (airtableRecordId) payload.airtable_record_id = airtableRecordId;
      if (action === "approve") {
        payload["generation_method"] = generationMethod;
        payload["edited_title"] = titleInput.value;
        payload["edited_html"] = currentContent;
      }
      fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) })
      .then(() => alert(`${action} мҡ”мІӯ мҷ„лЈҢ`))
      .catch(() => alert("мҳӨлҘҳ л°ңмғқ"));
    }

    function goHome() {
      window.location.href = HYLAuth.buildCompanyUrl("blog-list-page.html", company);
    }
  </script>
</body>
</html>
