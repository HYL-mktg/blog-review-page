<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뉴스 상세 이동</title>
  <link rel="stylesheet" href="theme-modern.css" />
</head>
<body>
  <script src="auth.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const postId = params.get("post_id");
    const access = HYLAuth.resolveCompanyWithPublicOption({
      params,
      fallbackPath: "index-company.html",
      redirectTo: "index.html"
    });

    if (!access.company || !postId) {
      window.location.replace("index-company.html");
    } else {
      const nextUrl = HYLAuth.buildDetailUrl("review-detail-news.html", access.company, postId);
      window.location.replace(nextUrl);
    }
  </script>
</body>
</html>
