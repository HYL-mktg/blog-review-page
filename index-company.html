<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기업별 콘텐츠 관리</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      padding: 40px;
    }
    h2 {
      font-size: 28px;
      margin-bottom: 24px;
      text-align: center;
    }
    table {
      width: 80%;
      margin: 0 auto;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 12px;
      text-align: left;
    }
    th {
      background-color: #f7f7f7;
    }
    a {
      text-decoration: none;
      color: #0077cc;
      font-weight: 700;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2>기업별 블로그 콘텐츠 관리</h2>
  <table>
    <thead>
      <tr>
        <th>번호</th>
        <th>기업명</th>
        <th>콘텐츠 수</th>
      </tr>
    </thead>
    <tbody id="company-table-body">
      <tr><td colspan="3">데이터를 불러오는 중입니다...</td></tr>
    </tbody>
  </table>

  <script>
    const tableBody = document.getElementById("company-table-body");

    fetch("https://hyltest-airtable.mktg-95f.workers.dev/")
      .then((res) => {
        if (!res.ok) throw new Error("데이터 요청 실패");
        return res.json();
      })
      .then((records) => {
        const counts = {};

        records.forEach((record) => {
          const name = record.fields?.["기업명"];
          if (name) counts[name] = (counts[name] || 0) + 1;
        });

        const sortedNames = Object.keys(counts).sort((a, b) => a.localeCompare(b, "ko"));

        if (!sortedNames.length) {
          tableBody.innerHTML = `<tr><td colspan="3">등록된 기업이 없습니다.</td></tr>`;
          return;
        }

        tableBody.innerHTML = "";
        sortedNames.forEach((name, index) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${index + 1}</td>
            <td><a href="blog-list-page.html?company=${encodeURIComponent(name)}">${name}</a></td>
            <td>${counts[name]}</td>
          `;
          tableBody.appendChild(row);
        });
      })
      .catch((err) => {
        console.error(err);
        tableBody.innerHTML = `<tr><td colspan="3">기업 목록 불러오기에 실패했습니다.</td></tr>`;
      });
  </script>
</body>
</html>
