<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYL 콘텐츠 검토 허브</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    header {
      position: absolute;
      top: 20px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #auth-badge {
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef3ff;
      color: #1f3f8f;
      border: 1px solid #cddcff;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 28px;
      text-align: center;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    button {
      padding: 14px 24px;
      font-size: 17px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    .pay-btn {
      background: #2b9348;
    }

    .main-btn {
      background: #0077cc;
    }

    .sub-btn {
      background: #1d4ed8;
    }
  </style>
  <link rel="stylesheet" href="theme-modern.css" />
</head>
<body>
  <header>
    <span id="auth-badge">로그인 필요</span>
    <button id="auth-btn" class="sub-btn" type="button" onclick="handleAuthClick()">로그인</button>
    <button class="pay-btn" type="button" onclick="location.href='payment.html'">결제</button>
  </header>

  <h1>HYL 콘텐츠 검토 허브</h1>

  <div class="button-container">
    <button class="main-btn" type="button" onclick="goContentReview()">AI 콘텐츠 검토</button>
    <button class="sub-btn" type="button" onclick="location.href='press-form.html'">보도자료 생성</button>
    <button class="sub-btn" type="button" onclick="goNewsReview()">뉴스 콘텐츠 검토</button>
  </div>

  <script src="auth.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const companyParam = params.get("company");
    const postId = params.get("post_id");

    // Legacy support for old detail links.
    if (companyParam && postId) {
      window.location.replace(
        `review-detail.html?company=${encodeURIComponent(companyParam)}&post_id=${encodeURIComponent(postId)}`
      );
    }

    const authBadge = document.getElementById("auth-badge");
    const authBtn = document.getElementById("auth-btn");

    function updateAuthUI() {
      const auth = HYLAuth.getAuth();
      if (!auth) {
        authBadge.textContent = "로그인 필요";
        authBtn.textContent = "로그인";
        return;
      }
      authBadge.textContent = `${auth.company} | ${auth.id}${HYLAuth.isAdmin(auth) ? " (관리자)" : ""}`;
      authBtn.textContent = "로그아웃";
    }

    async function handleAuthClick() {
      const current = HYLAuth.getAuth();
      if (current) {
        HYLAuth.clearAuth();
        updateAuthUI();
        alert("로그아웃되었습니다.");
        return;
      }

      const auth = await HYLAuth.loginWithPrompt();
      if (auth) {
        updateAuthUI();
        alert(`${auth.company} 계정으로 로그인되었습니다.`);
      }
    }

    function goContentReview() {
      const auth = HYLAuth.getAuth();
      if (!auth) {
        alert("로그인 후 이용해 주세요.");
        return;
      }
      window.location.href = "index-company.html";
    }

    function goNewsReview() {
      const auth = HYLAuth.getAuth();
      if (!auth) {
        alert("로그인 후 이용해 주세요.");
        return;
      }
      window.location.href = "blog-list-page-news.html";
    }

    updateAuthUI();
  </script>
</body>
</html>
