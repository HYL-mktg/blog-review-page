<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYL 콘텐츠 검토 허브</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      background-color: #f9f9f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }
    header {
      position: absolute;
      top: 20px;
      right: 24px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 28px;
      text-align: center;
    }
    .button-container {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }
    button {
      padding: 14px 24px;
      font-size: 17px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    button:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }
    .pay-btn {
      background: #2b9348;
    }
    .main-btn {
      background: #0077cc;
    }
    .sub-btn {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <header>
    <button class="pay-btn" onclick="location.href='payment.html'">결제</button>
  </header>

  <h1>HYL 콘텐츠 검토 허브</h1>

  <div class="button-container">
    <button class="main-btn" onclick="loginWithAccount()">AI 콘텐츠 검토</button>
    <button class="sub-btn" onclick="location.href='press-form.html'">보도자료 생성</button>
    <button class="sub-btn" onclick="location.href='blog-list-page-news.html?company=하이쓰리디'">뉴스 콘텐츠</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const company = params.get("company");
    const postId = params.get("post_id");

    // Legacy support: keep old direct links working.
    if (company && postId) {
      window.location.replace(
        `review-detail.html?company=${encodeURIComponent(company)}&post_id=${encodeURIComponent(postId)}`
      );
    }

    window.addEventListener("DOMContentLoaded", () => {
      const token = sessionStorage.getItem("token");
      if (token) {
        window.location.href = "index-company.html";
      }
    });

    async function loginWithAccount() {
      const id = prompt("아이디를 입력해 주세요.");
      if (!id) return;

      const password = prompt("비밀번호를 입력해 주세요.");
      if (!password) return;

      try {
        const response = await fetch("https://hyltest-login.mktg-95f.workers.dev/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id, password })
        });

        if (response.status === 200) {
          const result = await response.json();
          sessionStorage.setItem("token", result.token || "");
          sessionStorage.setItem("id", id);
          window.location.href = "index-company.html";
          return;
        }

        if (response.status === 401) {
          alert("아이디 또는 비밀번호가 올바르지 않습니다.");
          return;
        }

        alert(`로그인 서버 오류: ${response.status}`);
      } catch (error) {
        alert(`네트워크 오류: ${error.message}`);
      }
    }
  </script>
</body>
</html>
